name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --locked

      - name: Compute SHA-256
        id: hash
        shell: pwsh
        run: |
          $h = (Get-FileHash -Algorithm SHA256 target/release/netwatch.exe).Hash.ToLower()
          "sha256=$h" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "SHA-256: $h"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $sha = "${{ steps.hash.outputs.sha256 }}"
          # Create the release if it doesn't exist (no-op if it does)
          gh release view $tag --repo ${{ github.repository }} 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --repo ${{ github.repository }} --title $tag --prerelease --notes "SHA-256: ``$sha``"
          }
          gh release upload $tag target/release/netwatch.exe --repo ${{ github.repository }} --clobber
